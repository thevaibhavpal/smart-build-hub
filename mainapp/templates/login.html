{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="{% static 'css/bootstrap.css' %}" rel="stylesheet">
    <style>
        body {
            background: url("{% static 'img/architech.jpeg' %}") no-repeat center center fixed;
            background-size: cover;
        }
        

        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
        }

        .login-box {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px #000;
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <!-- Background Overlay -->
    <div class="overlay"></div>

    <!-- Login Form Container -->
    <div class="d-flex justify-content-center align-items-center vh-100 login-container">
        <div class="login-box">
            <h2>Login Now</h2>

            {% if messages %}
                {% for m in messages %}
                    <div class="alert alert-success alert-dismissible fade show" role="alert">
                        {{ m }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" id="name" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" id="password" required>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-warning px-4">Login</button>
                </div>
                <a href="{% url 'register' %}" style="margin-left:40px;">Don't have an Account? Register Now</a>
                <button class="btn btn-info "><a href="{% url 'chpass1' %}" style="text-decoration:none; color:black;">Forgot Contractor</a></button>
                <button class="btn btn-danger"><a href="{% url 'chpass2' %}" style="text-decoration:none; color:black;">Forgot Homeowner</a></button>
            </form>
        </div>
    </div>

    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>

</html>
