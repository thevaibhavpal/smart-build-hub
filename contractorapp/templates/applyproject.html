{% extends 'contractorbase.html' %}


{% block main %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h3>Project application</h3>

    {% if messages %}
    {% for m in messages %}
    <div class="alert alert-info alert-dismissible fade show" role="alert">
        {{ m }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}

    <div class="row">
        <div class="col-sm-10 mx-auto">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="pro" class="form-label">proposal Text</label>
                    <textarea name="proposal_text" id="pro" class="form-control"></textarea>
                </div>
                <div class="mb-3">
                    <label for="pro" class="form-label">Upload design file</label>
                    <input type="file" name="design_file" id="design" class="form-control" required />
                </div>
                <div class="mb-3">
                    <label for="budget" class="form-label">Estimated Budget</label>
                    <input type="number" name="estimated_budget" step="0.01" id="budget" class="form-control"
                        required />
                </div>
                <div class="mb-3">
                    <label for="duration" class="form-label">Estimated Duration</label>
                    <input type="number" name="estimated_duration" id="duration" class="form-control" required />
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary">Submit</button>
                </div>
            </form>
        </div>
    </div>


</body>

</html>

{% endblock %}
